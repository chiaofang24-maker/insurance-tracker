function updateCustomAdd(){const plan=document.getElementById("custom-plan").value;document.getElementById("custom-add").innerHTML=(ADD_OPTIONS[plan]||[]).map(v=>`<option value="${v}">${v} 萬</option>`).join("");}
function getDaysIndex(d){const idx=DAYS.indexOf(d);if(idx>=0)return idx;for(let i=0;i<DAYS.length;i++)if(DAYS[i]>=d)return i;return DAYS.length-1;}
function calc(){const ag=document.getElementById("age-group").value;const info=AGE_GROUPS[ag];const days=getDays();if(!days){alert("請輸入正確的起保與終止時間");return;}if(days>info.maxDays){alert(`此年齡區間最長天數為 ${info.maxDays} 天，目前輸入 ${days} 天`);return;}const under15=ag==="under15";const daysIdx=getDaysIndex(days);const actualDays=DAYS[daysIdx];let plan,add,planLabel;if(selectedPreset<3){const p=PRESETS[selectedPreset];plan=p.plan;add=p.add;planLabel=p.label;}else{plan=document.getElementById("custom-plan").value;add=parseInt(document.getElementById("custom-add").value);const pn={overseas:"海外加值型",overseas_super:"海外加值+超值 TI",overseas_elite:"海外加值+尊榮 TI",schengen:"申根加值型",schengen_super:"申根加值+超值 TI",schengen_elite:"申根加值+尊榮 TI"};planLabel=`${pn[plan]} / ADD ${add}萬`;}if(add>info.maxAdd&&info.maxAdd>0){alert(`此年齡區間保額上限為 ${info.maxAdd} 萬，請調整方案`);return;}let premium=null;if(under15){const r=RATES_UNDER15[plan];if(r)premium=(r[69]||[])[daysIdx];}else{const r=RATES[plan];if(r)premium=(r[add]||[])[daysIdx];}const s=document.getElementById("start-time").value.replace("T"," ");const e=document.getElementById("end-time").value.replace("T"," ");document.getElementById("result-label").textContent=`${info.label}　${s} ～ ${e}（${days}天）\n${planLabel}`;const card=document.getElementById("result-card");if(!premium){card.innerHTML=`<div class="notice info">此條件無對應費率，請確認方案與保額組合</div>`;}else{const note=days!==actualDays?`<p class="sub">費率表無 ${days} 天，以最近天數 ${actualDays} 天計算</p>`:"";card.innerHTML=`<div class="result-inner"><p class="rl">保費</p><p class="amount">NT$ ${premium.toLocaleString()}</p>${note}</div>`;}document.getElementById("result").style.display="block";}
renderPresets();updateCustomAdd();onAgeChange();setDefaultTimes();
</script>
