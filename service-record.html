<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保單服務記錄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--tf:#0ABAB5;--tfl:#E0F7F6;--tfm:#5DCEC9;--tfd:#077B78;--tfdp:#045A58;--mint:#F0FAFA;--sage:#D4F0EE;--h:"Comic Sans MS","Chalkboard SE",cursive;}
body{background:#F5FAFA;font-family:var(--h);}
.app{padding:1rem;max-width:600px;margin:0 auto;}
.hdr{background:var(--tf);border-radius:22px;padding:1.2rem 1.5rem;margin-bottom:1rem;}
.hdr h1{font-size:26px;font-weight:600;color:#fff;font-family:var(--h);}
.hdr p{font-size:14px;color:rgba(255,255,255,0.85);font-family:var(--h);margin-top:2px;}
.sb{font-family:var(--h);font-size:14px;padding:8px 14px;border-radius:14px;margin-bottom:10px;text-align:center;}
.sl2{background:#FFF4E0;color:#8A5C00;border:1px solid #F5CC80;}
.sok{background:var(--tfl);color:var(--tfd);border:1px solid var(--tfm);}
.ser{background:#FDECEA;color:#B03030;border:1px solid #F0A8A8;}
.st{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1rem;}
.sc{background:var(--tfl);border-radius:20px;padding:12px 8px;text-align:center;border:1.5px solid var(--tfm);}
.sn{font-family:var(--h);font-size:26px;font-weight:600;color:var(--tfd);}
.sl{font-family:var(--h);font-size:13px;color:var(--tfd);margin-top:2px;}
.card{background:#fff;border-radius:22px;padding:1.2rem 1.3rem;margin-bottom:1rem;border:1.5px solid var(--sage);}
.ch{background:var(--mint);border-radius:16px;padding:8px 14px;margin-bottom:14px;border-left:4px solid var(--tf);font-family:var(--h);font-size:17px;font-weight:600;color:var(--tfd);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.row1{display:grid;grid-template-columns:1fr;margin-bottom:10px;}
.f label{font-family:var(--h);font-size:14px;color:var(--tfd);display:block;margin-bottom:4px;font-weight:600;}
.f input,.f select,.f textarea{width:100%;font-family:var(--h);font-size:16px;border:1.5px solid var(--sage);border-radius:14px;padding:9px 13px;background:var(--mint);color:var(--tfdp);outline:none;}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--tf);background:#fff;}
.f textarea{height:60px;resize:none;}
.xtra{background:var(--tfl);border-radius:16px;padding:12px 14px;margin-bottom:10px;border:1.5px dashed var(--tfm);}
.xtra-t{font-family:var(--h);font-size:14px;font-weight:600;color:var(--tfd);margin-bottom:8px;}
.abtn{width:100%;padding:12px;font-family:var(--h);font-size:18px;font-weight:600;cursor:pointer;margin-top:6px;border-radius:18px;background:var(--tf);color:#fff;border:none;}
.abtn:disabled{opacity:0.5;cursor:not-allowed;}
.si{width:100%;font-family:var(--h);font-size:16px;border:1.5px solid var(--sage);border-radius:14px;padding:9px 13px;background:var(--mint);color:var(--tfdp);outline:none;margin-bottom:12px;}
.record{padding:12px 0;border-bottom:1.5px dashed var(--sage);}
.record:last-child{border-bottom:none;}
.record-top{display:flex;justify-content:space-between;align-items:flex-start;}
.record-name{font-family:var(--h);font-size:20px;font-weight:600;color:var(--tfdp);}
.record-date{font-family:var(--h);font-size:14px;color:var(--tfm);}
.tag{display:inline-block;font-family:var(--h);font-size:13px;padding:3px 12px;border-radius:20px;font-weight:600;margin-top:5px;}
.tag-teal{background:var(--tfl);color:var(--tfd);border:1.5px solid var(--tfm);}
.tag-green{background:#E6F4EA;color:#2E7D42;border:1.5px solid #A8D5B2;}
.tag-amber{background:#FFF4E0;color:#8A5C00;border:1.5px solid #F5CC80;}
.tag-red{background:#FDECEA;color:#B03030;border:1.5px solid #F0A8A8;}
.tag-purple{background:#F0EEFE;color:#4A3AAA;border:1.5px solid #C5BDEF;}
.record-extra{font-family:var(--h);font-size:14px;color:var(--tfd);margin-top:5px;background:var(--mint);border-radius:10px;padding:5px 10px;display:inline-block;}
.record-note{font-family:var(--h);font-size:15px;color:#666;margin-top:5px;}
.edit-btn{font-family:var(--h);font-size:13px;background:#FFF4E0;color:#8A5C00;border:1px solid #F5CC80;border-radius:10px;padding:3px 10px;cursor:pointer;margin-top:6px;margin-right:6px;}
.del-btn{font-family:var(--h);font-size:13px;color:#ccc;background:none;border:none;cursor:pointer;padding:2px 6px;}
.empty{font-family:var(--h);font-size:17px;color:var(--tfm);text-align:center;padding:2rem 0;}
.edit-box{background:var(--mint);border:1.5px solid var(--sage);border-radius:16px;padding:12px 14px;margin-top:10px;}
.edit-box-t{font-family:var(--h);font-size:15px;font-weight:600;color:var(--tfd);margin-bottom:12px;}
.save-edit-btn{font-family:var(--h);font-size:14px;font-weight:600;padding:8px 18px;border-radius:12px;background:var(--tf);color:#fff;border:none;cursor:pointer;margin-right:8px;}
.cancel-edit-btn{font-family:var(--h);font-size:14px;padding:8px 18px;border-radius:12px;background:#fff;color:#888;border:1.5px solid var(--sage);cursor:pointer;}
.radio-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px;}
.radio-item{display:flex;align-items:center;gap:6px;font-family:var(--h);font-size:16px;color:var(--tfdp);}
.radio-item input{width:17px;height:17px;accent-color:var(--tf);}
</style>
</head>
<body>
<div class="app">
<div class="hdr"><h1>保單服務記錄</h1><p>隨時記錄，隨時查詢</p></div>
<div id="sb" class="sb sl2">連線中，載入資料...</div>
<div class="st">
  <div class="sc"><div class="sn" id="s-total">—</div><div class="sl">總記錄</div></div>
  <div class="sc"><div class="sn" id="s-today">—</div><div class="sl">今日</div></div>
  <div class="sc"><div class="sn" id="s-clients">—</div><div class="sl">客戶數</div></div>
</div>

<div class="card">
  <div class="ch">新增保單服務記錄</div>
  <div class="row">
    <div class="f"><label>客戶姓名</label><input id="f-name" type="text" placeholder="王小明"></div>
    <div class="f"><label>日期</label><input id="f-date" type="date"></div>
  </div>
  <div class="row">
    <div class="f">
      <label>服務類型</label>
      <select id="f-type" onchange="onTypeChange()">
        <option value="">請選擇</option>
        <option>信用卡變更</option>
        <option>保費繳費方式變更</option>
        <option>理賠申請</option>
        <option>加退保</option>
        <option>保單復效</option>
        <option>受益人變更</option>
        <option>聯絡資料變更</option>
        <option>保單借款</option>
        <option>契約轉換</option>
        <option>其他</option>
      </select>
    </div>
    <div class="f">
      <label>保險公司</label>
      <select id="f-company">
        <option value="">請選擇</option>
        <option>全球人壽</option><option>宏泰人壽</option><option>凱基人壽</option>
        <option>新光人壽</option><option>遠雄人壽</option><option>台灣人壽</option>
        <option>安達人壽</option><option>台銀人壽</option><option>富邦人壽</option>
        <option>第一金人壽</option><option>友邦人壽</option><option>元大人壽</option>
        <option>安聯人壽</option><option>保誠人壽</option><option>國泰人壽</option>
        <option>南山人壽</option><option>其他</option>
      </select>
    </div>
  </div>
  <div class="row1">
    <div class="f"><label>保單號碼</label><input id="f-policy" type="text" placeholder="選填"></div>
  </div>
  <div id="extra-wrap" style="display:none;"></div>
  <div class="row1">
    <div class="f"><label>備註說明</label><textarea id="f-note" placeholder="補充細節..."></textarea></div>
  </div>
  <button class="abtn" id="add-btn" onclick="addRecord()">＋ 新增記錄</button>
</div>

<div class="card">
  <div class="ch">查詢記錄</div>
  <input class="si" id="search" type="text" placeholder="輸入客戶姓名搜尋..." oninput="renderRecords()">
</div>

<div class="card">
  <div class="ch">記錄列表</div>
  <div id="list"></div>
</div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbzD78vK29yJM41NOnkLt3VUGLJeRd3NQPXF9U2f4CbMO1rg06PwmHXssWms3lMBGKz1fQ/exec';
var COMPANIES = ['全球人壽','宏泰人壽','凱基人壽','新光人壽','遠雄人壽','台灣人壽','安達人壽','台銀人壽','富邦人壽','第一金人壽','友邦人壽','元大人壽','安聯人壽','保誠人壽','國泰人壽','南山人壽','其他'];
var TYPE_TAG = {'信用卡變更':'tag-teal','理賠申請':'tag-red','加退保':'tag-green','保費繳費方式變更':'tag-amber','保單復效':'tag-green','受益人變更':'tag-purple','聯絡資料變更':'tag-teal','保單借款':'tag-amber','契約轉換':'tag-purple','其他':'tag-teal'};
var records = [];

function setSb(t, m) {
  var b = document.getElementById('sb');
  b.className = 'sb ' + t;
  b.textContent = m;
}

function buildExtraHTML(type, prefix, existingExtra) {
  var extra = existingExtra || {};
  var html = '';
  if (type === '信用卡變更') {
    html += '<div class="xtra"><div class="xtra-t">信用卡資料</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">';
    html += '<div class="f"><label>銀行名稱</label><input id="' + prefix + 'bank" type="text" placeholder="玉山銀行" value="' + (extra['銀行名稱'] || '') + '"></div>';
    html += '<div class="f"><label>卡號後四碼</label><input id="' + prefix + 'card4" type="text" placeholder="1234" maxlength="4" value="' + (extra['卡號後四碼'] || '') + '"></div>';
    html += '<div class="f"><label>有效年月</label><input id="' + prefix + 'expiry" type="month" value="' + (extra['有效年月'] || '') + '"></div>';
    html += '</div>';
    html += '<div class="f"><label>繳款人</label>';
    html += '<div class="radio-row">';
    html += '<label class="radio-item"><input type="radio" name="' + prefix + 'payer" value="要保人"' + (extra['繳款人'] === '要保人' ? ' checked' : '') + '> 要保人</label>';
    html += '<label class="radio-item"><input type="radio" name="' + prefix + 'payer" value="被保人"' + (extra['繳款人'] === '被保人' ? ' checked' : '') + '> 被保人</label>';
    html += '<label class="radio-item"><input type="radio" name="' + prefix + 'payer" value="其他"' + (extra['繳款人'] && extra['繳款人'] !== '要保人' && extra['繳款人'] !== '被保人' ? ' checked' : '') + ' onchange="togPayerOther(\'' + prefix + '\')"> 其他</label>';
    html += '</div>';
    html += '<div id="' + prefix + 'payer-other" style="margin-top:6px;' + (extra['繳款人'] && extra['繳款人'] !== '要保人' && extra['繳款人'] !== '被保人' ? '' : 'display:none;') + '">';
    html += '<input id="' + prefix + 'payer-other-input" type="text" placeholder="繳款人姓名" value="' + (extra['繳款人'] && extra['繳款人'] !== '要保人' && extra['繳款人'] !== '被保人' ? extra['繳款人'] : '') + '">';
    html += '</div></div></div>';
  } else if (type === '保費繳費方式變更') {
    html += '<div class="xtra"><div class="xtra-t">繳費資料</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">';
    html += '<div class="f" style="grid-column:1/-1"><label>繳費方式</label><select id="' + prefix + 'paytype">';
    ['年繳','半年繳','季繳','月繳'].forEach(function(o) {
      html += '<option' + (extra['繳費方式'] === o ? ' selected' : '') + '>' + o + '</option>';
    });
    html += '</select></div>';
    html += '<div class="f"><label>銀行名稱</label><input id="' + prefix + 'paybank" type="text" placeholder="台灣銀行" value="' + (extra['銀行名稱'] || '') + '"></div>';
    html += '<div class="f"><label>帳號末四碼</label><input id="' + prefix + 'payacct" type="text" placeholder="####" maxlength="4" value="' + (extra['帳號末四碼'] || '') + '"></div>';
    html += '</div>';
    html += '<div class="f"><label>繳款人</label>';
    html += '<div class="radio-row">';
    html += '<label class="radio-item"><input type="radio" name="' + prefix + 'payer" value="要保人"' + (extra['繳款人'] === '要保人' ? ' checked' : '') + '> 要保人</label>';
    html += '<label class="radio-item"><input type="radio" name="' + prefix + 'payer" value="被保人"' + (extra['繳款人'] === '被保人' ? ' checked' : '') + '> 被保人</label>';
    html += '<label class="radio-item"><input type="radio" name="' + prefix + 'payer" value="其他"' + (extra['繳款人'] && extra['繳款人'] !== '要保人' && extra['繳款人'] !== '被保人' ? ' checked' : '') + ' onchange="togPayerOther(\'' + prefix + '\')"> 其他</label>';
    html += '</div>';
    html += '<div id="' + prefix + 'payer-other" style="margin-top:6px;' + (extra['繳款人'] && extra['繳款人'] !== '要保人' && extra['繳款人'] !== '被保人' ? '' : 'display:none;') + '">';
    html += '<input id="' + prefix + 'payer-other-input" type="text" placeholder="繳款人姓名" value="' + (extra['繳款人'] && extra['繳款人'] !== '要保人' && extra['繳款人'] !== '被保人' ? extra['繳款人'] : '') + '">';
    html += '</div></div></div>';
  }
  return html;
}

function togPayerOther(prefix) {
  var v = document.querySelector('input[name="' + prefix + 'payer"]:checked');
  var box = document.getElementById(prefix + 'payer-other');
  if (box) box.style.display = (v && v.value === '其他') ? 'block' : 'none';
}

function getExtraValues(prefix, type) {
  var extra = {};
  if (type === '信用卡變更') {
    var bank = document.getElementById(prefix + 'bank');
    var card4 = document.getElementById(prefix + 'card4');
    var expiry = document.getElementById(prefix + 'expiry');
    if (bank) extra['銀行名稱'] = bank.value;
    if (card4) extra['卡號後四碼'] = card4.value;
    if (expiry) extra['有效年月'] = expiry.value;
    var payer = document.querySelector('input[name="' + prefix + 'payer"]:checked');
    if (payer) {
      if (payer.value === '其他') {
        var oi = document.getElementById(prefix + 'payer-other-input');
        extra['繳款人'] = oi ? oi.value.trim() || '其他' : '其他';
      } else {
        extra['繳款人'] = payer.value;
      }
    }
  } else if (type === '保費繳費方式變更') {
    var pt = document.getElementById(prefix + 'paytype');
    var pb = document.getElementById(prefix + 'paybank');
    var pa = document.getElementById(prefix + 'payacct');
    if (pt) extra['繳費方式'] = pt.value;
    if (pb) extra['銀行名稱'] = pb.value;
    if (pa) extra['帳號末四碼'] = pa.value;
    var payer = document.querySelector('input[name="' + prefix + 'payer"]:checked');
    if (payer) {
      if (payer.value === '其他') {
        var oi = document.getElementById(prefix + 'payer-other-input');
        extra['繳款人'] = oi ? oi.value.trim() || '其他' : '其他';
      } else {
        extra['繳款人'] = payer.value;
      }
    }
  }
  return extra;
}

function onTypeChange() {
  var type = document.getElementById('f-type').value;
  var wrap = document.getElementById('extra-wrap');
  var html = buildExtraHTML(type, 'f-', {});
  if (html) { wrap.innerHTML = html; wrap.style.display = 'block'; }
  else { wrap.innerHTML = ''; wrap.style.display = 'none'; }
}

async function loadRecords() {
  try {
    var res = await fetch(API);
    var d = await res.json();
    records = Array.isArray(d) ? d : [];
    setSb('sok', '已連線，資料同步自 Google Sheets');
    renderRecords();
  } catch(e) {
    setSb('ser', '無法連線，請檢查網路');
  }
}

async function addRecord() {
  var name = document.getElementById('f-name').value.trim();
  var date = document.getElementById('f-date').value;
  var type = document.getElementById('f-type').value;
  var company = document.getElementById('f-company').value;
  var policy = document.getElementById('f-policy').value.trim();
  var note = document.getElementById('f-note').value.trim();
  if (!name || !date || !type) { alert('請填寫客戶姓名、日期及服務類型'); return; }
  var extra = getExtraValues('f-', type);
  var record = { action: 'add', id: Date.now(), name: name, date: date, type: type, company: company, policy: policy, note: note, extra: extra };
  var btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = '儲存中...';
  setSb('sl2', '儲存至 Google Sheets...');
  try {
    await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(record) });
    records.unshift(record);
    document.getElementById('f-name').value = '';
    document.getElementById('f-type').value = '';
    document.getElementById('f-company').value = '';
    document.getElementById('f-policy').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('extra-wrap').innerHTML = '';
    document.getElementById('extra-wrap').style.display = 'none';
    setSb('sok', '已儲存並同步至 Google Sheets');
    renderRecords();
  } catch(e) { setSb('ser', '儲存失敗，請重試'); }
  btn.disabled = false; btn.textContent = '＋ 新增記錄';
}

async function deleteRecord(id) {
  if (!confirm('確定刪除這筆記錄？')) return;
  setSb('sl2', '刪除中...');
  try {
    await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id: id }) });
    records = records.filter(function(r) { return String(r.id) !== String(id); });
    setSb('sok', '已刪除');
    renderRecords();
  } catch(e) { setSb('ser', '刪除失敗'); }
}

function openEditBox(idx) {
  var r = records[idx];
  if (!r) return;
  var existingBox = document.getElementById('edit-box-' + idx);
  if (existingBox) { existingBox.remove(); return; }
  var extra = typeof r.extra === 'string' ? JSON.parse(r.extra || '{}') : (r.extra || {});
  var coOpts = COMPANIES.map(function(c) {
    return '<option' + (r.company === c ? ' selected' : '') + '>' + c + '</option>';
  }).join('');
  var typeOpts = ['信用卡變更','保費繳費方式變更','理賠申請','加退保','保單復效','受益人變更','聯絡資料變更','保單借款','契約轉換','其他'].map(function(t) {
    return '<option' + (r.type === t ? ' selected' : '') + '>' + t + '</option>';
  }).join('');
  var box = document.createElement('div');
  box.id = 'edit-box-' + idx;
  box.className = 'edit-box';
  box.innerHTML = '<div class="edit-box-t">編輯記錄</div>'
    + '<div class="f" style="margin-bottom:10px;"><label>服務類型</label>'
    + '<select id="et-type-' + idx + '" onchange="onEditTypeChange(' + idx + ')">'
    + '<option value="">請選擇</option>' + typeOpts + '</select></div>'
    + '<div class="f" style="margin-bottom:10px;"><label>保險公司</label>'
    + '<select id="et-company-' + idx + '"><option value="">請選擇</option>' + coOpts + '</select></div>'
    + '<div class="f" style="margin-bottom:10px;"><label>保單號碼</label>'
    + '<input id="et-policy-' + idx + '" type="text" value="' + (r.policy || '') + '" placeholder="選填"></div>'
    + '<div id="et-extra-' + idx + '">' + buildExtraHTML(r.type, 'et' + idx + '-', extra) + '</div>'
    + '<div class="f" style="margin-bottom:14px;"><label>備註</label>'
    + '<textarea id="et-note-' + idx + '" style="height:60px;resize:none;width:100%;font-family:var(--h);font-size:15px;border:1.5px solid var(--sage);border-radius:14px;padding:9px 13px;background:#fff;outline:none;">' + (r.note || '') + '</textarea></div>'
    + '<button class="save-edit-btn" onclick="saveEdit(' + idx + ')">儲存</button>'
    + '<button class="cancel-edit-btn" onclick="document.getElementById(\'edit-box-' + idx + '\').remove()">取消</button>';
  var recEl = document.getElementById('rec-' + idx);
  if (recEl) recEl.appendChild(box);
}

function onEditTypeChange(idx) {
  var type = document.getElementById('et-type-' + idx).value;
  var wrap = document.getElementById('et-extra-' + idx);
  if (wrap) wrap.innerHTML = buildExtraHTML(type, 'et' + idx + '-', {});
}

async function saveEdit(idx) {
  var r = records[idx];
  if (!r) return;
  var type = document.getElementById('et-type-' + idx).value;
  var company = document.getElementById('et-company-' + idx).value;
  var policy = document.getElementById('et-policy-' + idx).value.trim();
  var note = document.getElementById('et-note-' + idx).value.trim();
  var extra = getExtraValues('et' + idx + '-', type);
  var extraText = Object.entries(extra).filter(function(e) { return e[1]; }).map(function(e) { return e[0] + '：' + e[1]; }).join('、');
  setSb('sl2', '更新中...');
  try {
    var url = API + '?action=edit&id=' + encodeURIComponent(r.id) + '&type=' + encodeURIComponent(type) + '&company=' + encodeURIComponent(company) + '&policy=' + encodeURIComponent(policy) + '&note=' + encodeURIComponent(note) + '&extra=' + encodeURIComponent(extraText);
    await fetch(url);
    records[idx].type = type;
    records[idx].company = company;
    records[idx].policy = policy;
    records[idx].note = note;
    records[idx].extra = extra;
    setSb('sok', '已更新');
    renderRecords();
  } catch(e) { setSb('ser', '更新失敗'); }
}

function renderRecords() {
  var q = document.getElementById('search').value.trim().toLowerCase();
  var filtered = q ? records.filter(function(r) { return r.name && r.name.toLowerCase().includes(q); }) : records;
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('s-total').textContent = records.length;
  document.getElementById('s-today').textContent = records.filter(function(r) { return r.date === today; }).length;
  document.getElementById('s-clients').textContent = new Set(records.map(function(r) { return r.name; })).size;
  var list = document.getElementById('list');
  if (!filtered.length) { list.innerHTML = '<div class="empty">尚無記錄</div>'; return; }
  list.innerHTML = filtered.map(function(r, i) {
    var idx = records.indexOf(r);
    var tagClass = TYPE_TAG[r.type] || 'tag-teal';
    var extra = typeof r.extra === 'string' ? JSON.parse(r.extra || '{}') : (r.extra || {});
    var extraItems = Object.entries(extra).filter(function(e) { return e[1]; }).map(function(e) { return e[0] + '：' + e[1]; }).join('　｜　');
    return '<div class="record" id="rec-' + idx + '">'
      + '<div class="record-top">'
      + '<span class="record-name">' + r.name + '</span>'
      + '<span style="display:flex;align-items:center;gap:4px;">'
      + '<span class="record-date">' + (r.date || '') + '</span>'
      + '<button class="del-btn" onclick="deleteRecord(\'' + r.id + '\')">✕</button>'
      + '</span></div>'
      + '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px;">'
      + '<span class="tag ' + tagClass + '">' + (r.type || '') + '</span>'
      + (r.company ? '<span style="font-family:var(--h);font-size:14px;color:#888;">' + r.company + '</span>' : '')
      + (r.policy ? '<span style="font-family:var(--h);font-size:13px;color:#aaa;">保單：' + r.policy + '</span>' : '')
      + '</div>'
      + (extraItems ? '<div class="record-extra">' + extraItems + '</div>' : '')
      + (r.note ? '<div class="record-note">' + r.note + '</div>' : '')
      + '<button class="edit-btn" onclick="openEditBox(' + idx + ')">編輯</button>'
      + '</div>';
  }).join('');
}

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
loadRecords();
</script>
</body>
</html>
